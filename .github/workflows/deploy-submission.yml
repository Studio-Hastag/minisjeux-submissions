name: Deploy submission

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: publish-${{ github.event.pull_request.number }}

jobs:
  deploy:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Extraire le slug depuis le titre de la PR
        id: extract
        run: |
          SLUG=$(echo "${{ github.event.pull_request.title }}" | xargs)
          if ! [[ "$SLUG" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "Titre de PR invalide comme slug: $SLUG"
            exit 1
          fi
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Checkout le commit exact approuvé
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GH_PUSH_TOKEN }}

      - name: Vérifier que index.html existe
        run: |
          if [ ! -f "index.html" ]; then
            echo "ERREUR: index.html introuvable."
            exit 1
          fi

      - name: Créer le dossier sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            DEST="/home/hastagfr/projects/hastag/static/minisjeux.hastag.fr/${{ steps.extract.outputs.slug }}"
            if [ -d "$DEST" ]; then
              echo "Le dossier $DEST existe déjà, arrêt."
              exit 1
            fi
            mkdir -p "$DEST"

      - name: Copier index.html sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "index.html"
          target: "/home/hastagfr/projects/hastag/static/minisjeux.hastag.fr/${{ steps.extract.outputs.slug }}/"