name: Deploy submission

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    if: startsWith(github.event.comment.body, 'publish ')
    runs-on: ubuntu-latest

    steps:
      - name: Vérifier que la PR est approuvée
        id: check_approval
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PUSH_TOKEN }}
          script: |
            const prNumber = context.issue.number;

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const approved = reviews.some(r => r.state === "APPROVED");

            if (!approved) {
              core.setFailed("La PR n'est pas approuvée. Impossible de publier.");
              return;
            }

            console.log("PR approuvée ✔");

      - name: Extraire le slug depuis le commentaire
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PUSH_TOKEN }}
          script: |
            const body = context.payload.comment.body.trim();
            const slug = body.replace(/^publish\s+/i, '').trim();

            if (!/^[a-z0-9]+(-[a-z0-9]+)*$/.test(slug)) {
              core.setFailed(`Slug invalide: "${slug}".`);
              return;
            }

            core.setOutput('slug', slug);
            console.log("Slug:", slug);

      - name: Télécharger index.html depuis la PR
        id: download_file
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PUSH_TOKEN }}
          script: |
            const prNumber = context.issue.number;

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const indexFile = files.find(f => f.filename.endsWith("index.html"));

            if (!indexFile) {
              core.setFailed("index.html introuvable dans la PR.");
              return;
            }

            const res = await fetch(indexFile.raw_url);
            const content = await res.text();

            const fs = require("fs");
            fs.writeFileSync("index.html", content);

            console.log("index.html téléchargé ✔");

      - name: Créer le dossier sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            DEST="/home/hastagfr/projects/hastag/static/minisjeux.hastag.fr/${{ steps.extract.outputs.slug }}"
            if [ -d "$DEST" ]; then
              echo "Le dossier $DEST existe déjà."
              exit 1
            fi
            mkdir -p "$DEST"

      - name: Copier index.html sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "index.html"
          target: "/home/hastagfr/projects/hastag/static/minisjeux.hastag.fr/${{ steps.extract.outputs.slug }}/"
