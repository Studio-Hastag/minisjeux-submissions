name: Deploy submission

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: publish-${{ github.event.issue.number }}

jobs:
  deploy:
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, 'publish ')
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier l'auteur du commentaire et l'approbation sur le dernier commit
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PUSH_TOKEN }}
          script: |
            const prNumber = context.issue.number;

            // 1. L'auteur du commentaire doit être membre de l'org
            try {
              await github.rest.orgs.checkMembershipForUser({
                org: context.repo.owner,
                username: context.payload.comment.user.login
              });
            } catch (e) {
              core.setFailed(`${context.payload.comment.user.login} n'est pas membre de l'organisation, publication refusée.`);
              return;
            }

            // 2. Récupérer l'état actuel réel de la PR (source de vérité, pas le payload du commentaire)
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // 3. Il faut une review APPROVED qui porte sur le commit ACTUEL (pas un commit précédent)
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const validApproval = reviews.some(r => r.state === "APPROVED" && r.commit_id === pr.head.sha);

            if (!validApproval) {
              core.setFailed("Pas d'approbation valide sur le dernier commit de la PR (soit non approuvée, soit du code a été poussé après l'approbation).");
              return;
            }

            core.setOutput('sha', pr.head.sha);
            console.log("Vérifications passées, publication autorisée pour le commit", pr.head.sha);

      - name: Extraire le slug depuis le commentaire
        id: extract
        run: |
          SLUG=$(echo "${{ github.event.comment.body }}" | sed -E 's/^publish\s+//i' | xargs)
          if ! [[ "$SLUG" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "Slug invalide: $SLUG"
            exit 1
          fi
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Checkout le commit exact approuvé
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.check.outputs.sha }}
          token: ${{ secrets.GH_PUSH_TOKEN }}

      - name: Vérifier que index.html existe
        run: |
          if [ ! -f "index.html" ]; then
            echo "ERREUR: index.html introuvable."
            exit 1
          fi

      - name: Créer le dossier sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            DEST="/home/hastagfr/projects/hastag/static/minisjeux.hastag.fr/${{ steps.extract.outputs.slug }}"
            if [ -d "$DEST" ]; then
              echo "Le dossier $DEST existe déjà, arrêt."
              exit 1
            fi
            mkdir -p "$DEST"

      - name: Copier index.html sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "index.html"
          target: "/home/hastagfr/projects/hastag/static/minisjeux.hastag.fr/${{ steps.extract.outputs.slug }}/"