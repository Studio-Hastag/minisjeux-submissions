name: Deploy submission

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    # 1. Le commentaire doit commencer par "publish "
    # 2. La PR doit exister
    # 3. La PR doit être approuvée
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, 'publish ') &&
      contains(github.event.issue.state_reason, 'approved')
    runs-on: ubuntu-latest

    steps:
      - name: Extraire le slug depuis le commentaire
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PUSH_TOKEN }}
          script: |
            const body = context.payload.comment.body.trim();
            const slug = body.replace(/^publish\s+/i, '').trim();

            if (!/^[a-z0-9]+(-[a-z0-9]+)*$/.test(slug)) {
              core.setFailed(`Slug invalide: "${slug}". Format attendu: minuscules, chiffres, tirets.`);
              return;
            }

            core.setOutput('slug', slug);
            console.log("Slug:", slug);

      - name: Checkout new-games
        uses: actions/checkout@v4
        with:
          ref: new-games
          fetch-depth: 0
          token: ${{ secrets.GH_PUSH_TOKEN }}

      - name: Vérifier que le dossier n'existe pas déjà, puis le créer
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            DEST="/home/hastagfr/projects/hastag/static/minisjeux.hastag.fr/${{ steps.extract.outputs.slug }}"
            if [ -d "$DEST" ]; then
              echo "Le dossier $DEST existe déjà, arrêt."
              exit 1
            fi
            mkdir -p "$DEST"

      - name: Copier le fichier sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "index.html"
          target: "/home/hastagfr/projects/hastag/static/minisjeux.hastag.fr/${{ steps.extract.outputs.slug }}/"
